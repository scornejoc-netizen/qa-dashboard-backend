databases:
  - name: qa-dashboard-db
    plan: free
    databaseName: qa_dashboard
    user: qa_admin

services:
  - type: web
    name: qa-dashboard-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: qa-dashboard-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "true"
      - key: QA_WEBHOOK_TOKEN
        value: "qa-integra-2026-secret"
      - key: PYTHON_VERSION
        value: "3.12.0"
